name: Release packaged source code and binaries

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
    contents: read

jobs:
  build-cpp-binaries:
    if: ${{ github.event.pull_request.merged == true }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_static: [ON, OFF]
        enable_ability: [ON, OFF]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure and build on Linux (gcc)
        if: ${{ matrix.os == 'ubuntu-latest' }}
        env:
          CC: gcc
          CXX: g++
        run: |
          cmake -S jiezhu-cpp -B jiezhu-cpp/build-ci \
            -DCMAKE_BUILD_TYPE=Release \
            -DJIEZHU_BUILD_STATIC=${{ matrix.build_static }} \
            -DJIEZHU_ENABLE_JIEZHU_ABILITY=${{ matrix.enable_ability }}
          cmake --build jiezhu-cpp/build-ci --config Release

      - name: Configure and build on Windows (msvc)
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          cmake -S jiezhu-cpp -B jiezhu-cpp/build-ci -G "Visual Studio 17 2022" -A x64 -DJIEZHU_BUILD_STATIC=${{ matrix.build_static }} -DJIEZHU_ENABLE_JIEZHU_ABILITY=${{ matrix.enable_ability }}
          cmake --build jiezhu-cpp/build-ci --config Release

      - name: Package Linux binaries
        if: ${{ matrix.os == 'ubuntu-latest' }}
        id: package_linux
        run: |
          PACKAGE_FILE="jiezhu-cpp-linux-gcc-static-${{ matrix.build_static }}-ability-${{ matrix.enable_ability }}.tar.gz"
          tar -czf "$PACKAGE_FILE" -C jiezhu-cpp/build-ci/bin .
          echo "package_file=$PACKAGE_FILE" >> "$GITHUB_OUTPUT"

      - name: Package Windows binaries
        if: ${{ matrix.os == 'windows-latest' }}
        id: package_windows
        shell: pwsh
        run: |
          $packageFile = "jiezhu-cpp-windows-msvc-static-${{ matrix.build_static }}-ability-${{ matrix.enable_ability }}.zip"
          Compress-Archive -Path "jiezhu-cpp/build-ci/bin/*" -DestinationPath $packageFile -Force
          "package_file=$packageFile" >> $env:GITHUB_OUTPUT

      - name: Upload Linux binary package
        if: ${{ matrix.os == 'ubuntu-latest' }}
        uses: actions/upload-artifact@v4
        with:
          name: cpp-bin-linux-static-${{ matrix.build_static }}-ability-${{ matrix.enable_ability }}
          path: ${{ steps.package_linux.outputs.package_file }}
          retention-days: 7

      - name: Upload Windows binary package
        if: ${{ matrix.os == 'windows-latest' }}
        uses: actions/upload-artifact@v4
        with:
          name: cpp-bin-windows-static-${{ matrix.build_static }}-ability-${{ matrix.enable_ability }}
          path: ${{ steps.package_windows.outputs.package_file }}
          retention-days: 7

  build-py-wheel-linux:
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Build jiezhu-py wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel jiezhu-py

      - name: Upload jiezhu-py wheel
        uses: actions/upload-artifact@v4
        with:
          name: py-wheel-linux
          path: jiezhu-py/dist/*.whl
          retention-days: 7

  package-and-release:
    if: ${{ github.event.pull_request.merged == true }}
    needs: [build-cpp-binaries, build-py-wheel-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set release metadata
        id: metadata
        run: |
          RAW_TITLE="${{ github.event.pull_request.title }}"
          TAG="${RAW_TITLE}"
          TAG="${TAG#【}"
          TAG="${TAG%】}"
          TAG="${TAG# }"
          TAG="${TAG% }"
          TAG="$(printf '%s' "$TAG" | sed -E 's/[[:space:]]*\([^)]*\)[[:space:]]*$//')"

          if [ -z "$TAG" ]; then
            echo "PR title is empty after normalization, cannot create release tag."
            exit 1
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "release_name=${TAG}-packages" >> "$GITHUB_OUTPUT"

      - name: Create archives
        run: |
          zip -r jiezhu-cpp.zip jiezhu-cpp
          zip -r jiezhu-py.zip jiezhu-py

      - name: Download compiled binary packages
        uses: actions/download-artifact@v4
        with:
          pattern: cpp-bin-*
          path: release-assets
          merge-multiple: true

      - name: Download jiezhu-py wheel
        uses: actions/download-artifact@v4
        with:
          pattern: py-wheel-*
          path: release-assets
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.tag }}
          name: ${{ steps.metadata.outputs.release_name }}
          generate_release_notes: true
          files: |
            jiezhu-cpp.zip
            jiezhu-py.zip
            release-assets/*